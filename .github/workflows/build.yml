name: Build Windows

on: [push]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter config --enable-windows-desktop
      - run: flutter pub get

      - name: Patch vosk_flutter_service CMakeLists.txt
        shell: pwsh
        run: |
          $base = "$env:LOCALAPPDATA\Pub\Cache\hosted\pub.dev"
          $pkg  = Get-ChildItem $base -Directory -Filter "vosk_flutter_service-*" | Select-Object -First 1
          $cmake = Join-Path $pkg.FullName "windows\CMakeLists.txt"
          (Get-Content $cmake) `
            -replace 'set\(PROJECT_NAME "vosk_flutter"\)', 'set(PROJECT_NAME "vosk_flutter_service")' `
            -replace 'set\(PLUGIN_NAME "vosk_flutter_plugin"\)', 'set(PLUGIN_NAME "vosk_flutter_service_plugin")' `
            -replace 'set\(vosk_flutter_bundled_libraries', 'set(vosk_flutter_service_bundled_libraries' `
            -replace '"pub" "run" "vosk_flutter"', '"pub" "run" "vosk_flutter_service"' |
            Set-Content $cmake

      - name: Patch vosk_flutter_service include folder
        shell: pwsh
        run: |
          $base = "$env:LOCALAPPDATA\Pub\Cache\hosted\pub.dev"
          $pkg  = Get-ChildItem $base -Directory -Filter "vosk_flutter_service-*" | Select-Object -First 1
          $old  = Join-Path $pkg.FullName "windows\include\vosk_flutter"
          $new  = Join-Path $pkg.FullName "windows\include\vosk_flutter_service"
          if (Test-Path $old) { Rename-Item $old $new }

      - name: Patch vosk_flutter_service plugin cpp
        shell: pwsh
        run: |
          $base = "$env:LOCALAPPDATA\Pub\Cache\hosted\pub.dev"
          $pkg  = Get-ChildItem $base -Directory -Filter "vosk_flutter_service-*" | Select-Object -First 1
          $cpp  = Join-Path $pkg.FullName "windows\vosk_flutter_plugin.cpp"
          (Get-Content $cpp) `
            -replace 'include/vosk_flutter/', 'include/vosk_flutter_service/' |
            Set-Content $cpp

      - name: Install Vosk Windows binaries
        run: dart run vosk_flutter_service install -t windows

      - name: Copy Vosk DLLs to libs root
        shell: pwsh
        run: |
          $base = "$env:LOCALAPPDATA\Pub\Cache\hosted\pub.dev"
          $pkg  = Get-ChildItem $base -Directory -Filter "vosk_flutter_service-*" | Select-Object -First 1
          $libs = Join-Path $pkg.FullName "windows\libs"
          $sub  = Get-ChildItem $libs -Directory | Select-Object -First 1
          if ($sub) {
            Get-ChildItem $sub.FullName -Filter "*.dll" |
              Copy-Item -Destination $libs
          }

      - run: flutter build windows --release

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/
