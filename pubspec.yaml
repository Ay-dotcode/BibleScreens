name: bible_screens
description: Human-free church worship display — auto-detects Bible verses from speech.
version: 1.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  path_provider: ^2.1.2
  path: ^1.9.0
  file_picker: ^8.1.2
  window_manager: ^0.5.1
  cupertino_icons: ^1.0.6
  web: ^1.1.1
  record: ^6.2.0
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4
  vosk_flutter_service: ^0.0.7
  archive: 4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/databases/Songs.db
    - assets/databases/SongWords.db
    - assets/databases/SongHistory.db
